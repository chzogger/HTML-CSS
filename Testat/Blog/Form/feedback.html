<body>
    <br>
    <pre><div class="title"> Feedback                                     <a class="house" style="font-size: 65px;" href="../index.html">&#127968;</a></div></pre>


<br>



    <form>
        <p>Sehr gerne können Sie mir ein Feedback hinterlassen.</p>
        <p>Bitte füllen Sie folgendes Formular aus:</p>
        <br>
        
        
        <div class="formular"><label>Vorname:
                <input type="text" name="vorname" placeholder="Vorname"></label></div>
        <div class="formular"><label> Nachname:
                <input type="text" name="nachname" placeholder="Nachnme"></label></div>
        <div class="formular"><label>Geburtstag:
                <input type="date" name="geburtstag" placeholder="Geburtstag"></label></div>
        <div class="formular"><label> E-Mail:
                <input type="email" name="email" placeholder="Ihre E-Mail Adresse"></label></div>
        <div class="formular"><label> Möchten Sie den Newsletter abonnieren?
                <input type="checkbox"></label></div>
        <div class="formular"><label>Ihre Mitteilung:
                <textarea class="TextFeld" type="text" name="text" placeholder=""></textarea></label></div>
        <br>
        <div class="formular"><input type="submit" name="submit" value="Absenden !">
        </div>


    </form>


</body>
