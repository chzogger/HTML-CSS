<!DOCTYPE html>
<html lang="de-CH">

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Feedback</title>
        <link rel="stylesheet" href="../MyStyle.css">

</head>

<body>

        <div class="title"> Feedback <a class="house" style="font-size: 65px;" href="../index.html">&#127968;</a></div>


        <br>



        <p class="feedback">
                Sehr gerne können Sie mir ein Feedback hinterlassen.
                <br>
                Bitte füllen Sie folgendes Formular aus:
        </p>
        <form>

                <div>
                        <div class="formular"><label class="vorname">Vorname:
                                        <input type="text" name="vorname" placeholder="Vorname"></label></div>
                        <div class="formular"><label class="nachname"> Nachname:
                                        <input type="text" name="nachname" placeholder="Nachnme"></label></div>
                        <div class="formular"><label class="birthday">Geburtstag:
                                        <input type="date" name="geburtstag" placeholder="Geburtstag"></label></div>
                        <div class="formular"><label class="email"> E-Mail:
                                        <input type="email" name="email" placeholder="Ihre E-Mail Adresse"></label>
                        </div>
                        <div class="formular newsletter-box">
                                <label class="newsletter">
                                        Möchten Sie den Newsletter abonnieren?
                                        <input type="checkbox">
                                </label>
                        </div>

                        <div class="formular"><label class="message">Ihre Mitteilung:
                                        <textarea class="TextFeld" type="text" name="text" placeholder=""></textarea></label></div>


                        <div class="formular"><input type="submit" name="submit" value="Absenden !">
                        </div>

                </div>





        </form>


</body>

</html>
